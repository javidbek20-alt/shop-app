<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابداری دوکان</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0f766e">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  direction:rtl;
  background:#ecfeff;
  color:#0f172a;
}

.app{
  max-width:520px;
  margin:auto;
  min-height:100vh;
  padding-bottom:25px;
}

.header{
  background:linear-gradient(135deg,#0f766e,#14b8a6);
  color:white;
  padding:28px 18px 35px;
  border-radius:0 0 35px 35px;
  text-align:center;
}

.content{
  padding:0 15px;
  margin-top:-20px;
}

.card{
  background:white;
  padding:17px;
  margin-top:15px;
  border-radius:24px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  font-size:16px;
}

input,select{
  border:1px solid #d1d5db;
}

button{
  border:none;
  background:#0f766e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn-green{background:#16a34a}
.btn-purple{background:#7c3aed}
.btn-red{background:#dc2626}

.summary{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#f1f5f9;
  border-radius:20px;
  padding:14px;
  text-align:center;
}

.item{
  background:#f8fafc;
  border-radius:20px;
  padding:14px;
  margin-top:12px;
  border-right:6px solid #14b8a6;
}

.green{
  color:#16a34a;
  font-weight:bold;
}

.red{
  color:#dc2626;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>حسابداری دوکان</h1>
<p>ثبت خرید، فروش، فایده و نقص</p>
</div>

<div class="content">

<div class="card">

<h3>ثبت جنس</h3>

<input type="date" id="date">

<input type="text" id="product" placeholder="نام جنس">

<input type="number" id="quantity" placeholder="تعداد">

<input type="number" id="buyPrice" placeholder="قیمت خرید">

<input type="number" id="sellPrice" placeholder="قیمت فروش">

<button onclick="saveProduct()">ثبت جنس</button>

</div>

<div class="card">

<h3>گزارشات</h3>

<select id="reportType" onchange="showProducts()">
<option value="all">همه معلومات</option>
</select>

<input type="text" id="searchText"
onkeyup="showProducts()"
placeholder="جستجو">

<button class="btn-green" onclick="window.print()">
چاپ PDF
</button>

<button class="btn-purple" onclick="downloadCSV()">
دانلود Excel
</button>

</div>

<div class="card">

<h3>خلاصه</h3>

<div class="summary">

<div class="box">
مجموع خرید
<span id="totalBuy">0</span>
</div>

<div class="box">
مجموع فروش
<span id="totalSell">0</span>
</div>

</div>

<div class="box" id="resultBox" style="margin-top:10px">
<span id="totalProfit">0</span>
</div>

</div>

<div class="card">

<h3>لیست اجناس</h3>

<div id="products"></div>

</div>

</div>

</div>

<script>

let products =
JSON.parse(localStorage.getItem("products")) || [];

let filteredProducts = [];

document.getElementById("date").valueAsDate =
new Date();

function saveProduct(){

  let date =
  document.getElementById("date").value;

  let product =
  document.getElementById("product").value;

  let quantity =
  Number(document.getElementById("quantity").value);

  let buyPrice =
  Number(document.getElementById("buyPrice").value);

  let sellPrice =
  Number(document.getElementById("sellPrice").value);

  let totalBuy = quantity * buyPrice;

  let totalSell = quantity * sellPrice;

  let profit = totalSell - totalBuy;

  products.push({
    date,
    product,
    quantity,
    buyPrice,
    sellPrice,
    totalBuy,
    totalSell,
    profit
  });

  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

  showProducts();
}

function showProducts(){

  let div =
  document.getElementById("products");

  div.innerHTML = "";

  filteredProducts = products;

  let totalBuy = 0;
  let totalSell = 0;
  let totalProfit = 0;

  filteredProducts.forEach((p,index)=>{

    totalBuy += p.totalBuy;
    totalSell += p.totalSell;
    totalProfit += p.profit;

    div.innerHTML += `

    <div class="item">

      <h3>${p.product}</h3>

      <p>تاریخ: ${p.date}</p>

      <p>تعداد: ${p.quantity}</p>

      <p>خرید: ${p.buyPrice}</p>

      <p>فروش: ${p.sellPrice}</p>

      <p>مجموع خرید: ${p.totalBuy}</p>

      <p>مجموع فروش: ${p.totalSell}</p>

      <p class="${p.profit >=0 ? 'green':'red'}">

      نتیجه:
      ${p.profit}

      </p>

      <button class="btn-red"
      onclick="deleteProduct(${index})">

      حذف

      </button>

    </div>

    `;
  });

  document.getElementById("totalBuy").innerText =
  totalBuy;

  document.getElementById("totalSell").innerText =
  totalSell;

  document.getElementById("totalProfit").innerText =
  totalProfit;
}

function deleteProduct(index){

  products.splice(index,1);

  localStorage.setItem(
    "products",
    JSON.stringify(products)
  );

  showProducts();
}

function downloadCSV(){

  if(filteredProducts.length === 0){
    alert("معلومات وجود ندارد");
    return;
  }

  const data = filteredProducts.map(p => ({
   "تاریخ": p.date,
    "نام جنس": p.product,
    "تعداد": p.quantity,
    "قیمت خرید": p.buyPrice,
    "قیمت فروش": p.sellPrice,
    "مجموع خرید": p.totalBuy,
    "مجموع فروش": p.totalSell,
    "فایده / نقص": p.profit
  }));

  const worksheet =
  XLSX.utils.json_to_sheet(data);

  const workbook =
  XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    "Report"
  );

  XLSX.writeFile(
    workbook,
    "Shop_Report.xlsx"
  );
}

showProducts();

</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</body>
</html>
